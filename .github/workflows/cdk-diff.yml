name: CDK Diff

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cdk-diff:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_NAME: ${{ vars.AWS_ROLE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci
        working-directory: aws-cdk

      - name: Run build
        run: npm run build
        working-directory: aws-cdk

      - name: CDK Diff (development)
        run: |
          npx cdk diff CertificateDevelopmentStack MusicCoopDevelopmentStack --no-color > cdk-diff-output.development.txt 2>&1
        working-directory: aws-cdk

      - name: Post CDK Diff Comment in PR (development)
        uses: towardsthecloud/aws-cdk-diff-pr-commenter@v1
        with:
          diff-file: aws-cdk/cdk-diff-output.development.txt
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Diff (production)
        run: |
          npx cdk diff CertificateProductionStack MusicCoopProductionStack --no-color > cdk-diff-output.production.txt 2>&1
        working-directory: aws-cdk

      - name: Post CDK Diff Comment in PR (production)
        uses: towardsthecloud/aws-cdk-diff-pr-commenter@v1
        with:
          diff-file: aws-cdk/cdk-diff-output.production.txt
          aws-region: ${{ env.AWS_REGION }}
